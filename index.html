<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>웹카드 — 영업컨설팅파트 교육자료</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  :root{
    --navy:#12305C;
    --ink:#111318;
    --gray:#6B6F78;
    --line:#E6E8EE;
    --surface:#F4F6FA;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{
    font-family:'Pretendard','Pretendard Variable',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
    color:var(--ink);letter-spacing:-0.022em;-webkit-font-smoothing:antialiased;
    background:
      radial-gradient(ellipse 600px 400px at 15% 0%, #DCE6FF 0%, transparent 60%),
      radial-gradient(ellipse 520px 420px at 95% 12%, #EADDFF 0%, transparent 58%),
      linear-gradient(180deg,#F8FAFF 0%,#F2F5FB 100%);
    min-height:100dvh;
  }
  .comply-top{
    padding:11px 14px 9px;font-size:9.5px;line-height:1.35;font-weight:400;
    color:#9DA3AE;text-align:center;letter-spacing:-0.02em;
  }
  .wrap{max-width:600px;margin:0 auto;padding:22px 22px 60px;}

  header{text-align:center;margin-bottom:34px;}
  .badge{
    display:inline-flex;align-items:center;gap:7px;
    padding:9px 16px;margin-bottom:20px;border-radius:100px;
    background:rgba(255,255,255,.85);border:1px solid #D7DEEE;
    box-shadow:0 2px 10px rgba(18,48,92,.06);
    font-size:15px;font-weight:700;color:var(--navy);
  }
  .badge .dot{width:7px;height:7px;border-radius:50%;background:#3B72D9;}
  h1{
    font-size:clamp(34px,9vw,44px);font-weight:800;line-height:1.18;
    letter-spacing:-0.05em;margin-bottom:14px;color:#0E1D33;
  }
  h1 .grad{
    background:linear-gradient(100deg,#2A5596 0%,#5B4FD0 55%,#C4568C 100%);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  }
  header p{font-size:18px;line-height:1.65;color:var(--gray);font-weight:500;}

  .month{
    display:flex;align-items:center;gap:11px;
    margin:30px 0 13px;
  }
  .month .m{
    font-size:22px;font-weight:800;letter-spacing:-0.04em;color:var(--navy);
  }
  .month .rule{flex:1;height:1px;background:var(--line);}

  .card{
    display:flex;align-items:center;gap:15px;
    background:#fff;border:1px solid #E4E9F1;border-radius:22px;
    padding:20px;margin-bottom:11px;
    text-decoration:none;color:inherit;
    box-shadow:0 3px 14px rgba(18,48,92,.05);
    transition:transform .3s cubic-bezier(.32,.72,0,1), box-shadow .3s;
  }
  .card:hover,.card:focus-visible{
    transform:translateY(-2px);
    box-shadow:0 10px 28px rgba(18,48,92,.11);
    outline:none;border-color:#C9D8EF;
  }
  .card:active{transform:scale(.985);}
  .card .ico{
    flex:none;width:52px;height:52px;border-radius:16px;
    display:grid;place-items:center;font-size:24px;
    background:linear-gradient(145deg,#2A5596,#12305C);color:#fff;
    box-shadow:0 5px 14px rgba(18,48,92,.24);
  }
  .card .txt{flex:1;min-width:0;}
  .card .t{font-size:19px;font-weight:800;letter-spacing:-0.035em;margin-bottom:6px;line-height:1.3;}
  .card .d{font-size:15px;color:var(--gray);font-weight:500;line-height:1.5;}
  .card .meta{
    display:inline-block;margin-top:8px;padding:4px 9px;border-radius:8px;
    background:#EAF1FF;color:#2A5596;font-size:13px;font-weight:700;
  }
  .card .arw{flex:none;color:#B4BECD;}

  footer{
    margin-top:44px;padding-top:20px;border-top:1px solid var(--line);
    text-align:center;font-size:13px;color:#A2A7B2;line-height:1.6;font-weight:500;
  }
</style>
</head>
<body>
  <div class="comply-top">본 자료는 교육용으로 온라인 매체(SNS등) 및 고객 설명, 광고자료로 활용 행위는 법으로 금지됩니다.</div>

  <div class="wrap">
    <header>
      <div class="badge"><span class="dot"></span>영업컨설팅파트</div>
      <h1>웹카드<br><span class="grad">교육자료 모음</span></h1>
      <p>스마트폰으로 보는 교육자료입니다.<br>지난 자료도 여기서 다시 볼 수 있습니다.</p>
    </header>

    <div class="month">
      <span class="m">2026년 7월</span>
      <span class="rule"></span>
    </div>

    <a class="card" href="2607/si-uw/">
      <div class="ico">🩺</div>
      <div class="txt">
        <div class="t">SI 경증질환 심사기준 변경</div>
        <div class="d">인수불가였던 11개 질환이 인수 검토 대상으로</div>
        <span class="meta">7.20 시행</span>
      </div>
      <div class="arw">
        <svg width="9" height="15" viewBox="0 0 7 11" fill="none" aria-hidden="true">
          <path d="M1.5 1L5.5 5.5L1.5 10" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </a>

    <footer>
      영업컨설팅파트 · 모집인 교육용<br>
      세부 심사기준은 공문을 반드시 함께 확인하세요.
    </footer>
  </div>
</body>
</html>
